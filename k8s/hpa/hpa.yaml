# Horizontal Pod Autoscaler for Shield services in prod
# Scales pods based on CPU utilization; cluster autoscaler adds nodes when pods are pending.
#
# Applied only to prod namespace (dev stays at 1 replica always)
#
# With 1x B4ms baseline (autoscale to 3 nodes):
#  - Each new node: ~$120/month → billed only when active

# ── Gateway: 1→4 pods ─────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shield-gateway-hpa
  namespace: shield-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shield-gateway
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 min before scaling down
---
