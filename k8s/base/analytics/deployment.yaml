apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-analytics
  labels:
    app: shield-analytics
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: shield-analytics
  template:
    metadata:
      labels:
        app: shield-analytics
    spec:
      containers:
        - name: shield-analytics
          image: REGISTRY/shield-analytics:TAG
          ports:
            - containerPort: 8289
          envFrom:
            - configMapRef:
                name: shield-config
            - secretRef:
                name: shield-secrets
          env:
            - name: SERVER_PORT
              value: "8289"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:ShieldEureka2026@shield-eureka:8261/eureka/"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "false"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "shield-analytics"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8289
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8289
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 10
