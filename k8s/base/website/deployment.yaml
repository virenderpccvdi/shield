apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-website
  labels:
    app: shield-website
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: shield-website
  template:
    metadata:
      labels:
        app: shield-website
    spec:
      containers:
      - name: shield-website
        image: REGISTRY/shield-website:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
