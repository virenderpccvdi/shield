# PodDisruptionBudgets — ensure availability during voluntary disruptions
# (node drain, cluster upgrades, etc.)
# minAvailable: 1 guarantees at least one pod is always running.
#
# Applied to all stateless Shield services in shield-prod namespace.

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shield-gateway-pdb
  namespace: shield-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: shield-gateway
---
