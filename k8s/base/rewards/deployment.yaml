apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-rewards
  labels:
    app: shield-rewards
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: shield-rewards
  template:
    metadata:
      labels:
        app: shield-rewards
    spec:
      containers:
        - name: shield-rewards
          image: REGISTRY/shield-rewards:TAG
          ports:
            - containerPort: 8287
          envFrom:
            - configMapRef:
                name: shield-config
            - secretRef:
                name: shield-secrets
          env:
            - name: SERVER_PORT
              value: "8287"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:ShieldEureka2026@shield-eureka:8261/eureka/"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "false"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "shield-rewards"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8287
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8287
            initialDelaySeconds: 150
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
