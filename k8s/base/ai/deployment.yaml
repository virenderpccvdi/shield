apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-ai
  labels:
    app: shield-ai
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: shield-ai
  template:
    metadata:
      labels:
        app: shield-ai
    spec:
      containers:
        - name: shield-ai
          image: REGISTRY/shield-ai:TAG
          ports:
            - containerPort: 8291
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: REDIS_PASSWORD
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: ANTHROPIC_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: DEEPSEEK_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8291
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8291
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
