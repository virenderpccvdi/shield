apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-auth
  labels:
    app: shield-auth
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: shield-auth
  template:
    metadata:
      labels:
        app: shield-auth
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - shield-auth
                topologyKey: kubernetes.io/hostname
      containers:
        - name: shield-auth
          image: REGISTRY/shield-auth:TAG
          ports:
            - containerPort: 8281
          envFrom:
            - configMapRef:
                name: shield-config
            - secretRef:
                name: shield-secrets
          env:
            - name: SERVER_PORT
              value: "8281"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:ShieldEureka2026@shield-eureka:8261/eureka/"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "false"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "shield-auth"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:"
            - name: SHIELD_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shield-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "400Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8281
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8281
            initialDelaySeconds: 150
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
