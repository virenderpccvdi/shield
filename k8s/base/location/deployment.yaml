apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-location
  labels:
    app: shield-location
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: shield-location
  template:
    metadata:
      labels:
        app: shield-location
    spec:
      containers:
        - name: shield-location
          image: REGISTRY/shield-location:TAG
          ports:
            - containerPort: 8285
          envFrom:
            - configMapRef:
                name: shield-config
            - secretRef:
                name: shield-secrets
          env:
            - name: SERVER_PORT
              value: "8285"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:ShieldEureka2026@shield-eureka:8261/eureka/"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8285
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8285
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 10
