apiVersion: apps/v1
kind: Deployment
metadata:
  name: shield-notification
  labels:
    app: shield-notification
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: shield-notification
  template:
    metadata:
      labels:
        app: shield-notification
    spec:
      containers:
        - name: shield-notification
          image: REGISTRY/shield-notification:TAG
          ports:
            - containerPort: 8286
          envFrom:
            - configMapRef:
                name: shield-config
            - secretRef:
                name: shield-secrets
          env:
            - name: SERVER_PORT
              value: "8286"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:ShieldEureka2026@shield-eureka:8261/eureka/"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8286
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8286
            initialDelaySeconds: 150
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
