# Shared non-secret configuration for all Shield services
# Secrets (DB password, JWT, etc.) go in shield-secrets Secret
apiVersion: v1
kind: ConfigMap
metadata:
  name: shield-config
data:
  # Service discovery — Eureka running in same namespace
  EUREKA_HOST: "shield-eureka"
  EUREKA_PORT: "8261"
  EUREKA_ZONE: "http://shield-eureka:8261/eureka/"

  # Logging
  SPRING_PROFILES_ACTIVE: "kubernetes"
  LOG_LEVEL: "INFO"

  # Disable Spring Cloud Config Server — all config comes from env vars (k8s secrets + this ConfigMap)
  SPRING_CONFIG_IMPORT: "optional:"
  SPRING_CLOUD_CONFIG_ENABLED: "false"
  SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED: "false"

  # PostgreSQL pool settings
  DB_POOL_SIZE: "5"
  DB_MIN_IDLE: "2"

  # Redis (SSL for Azure Cache)
  REDIS_SSL: "true"

  # App URLs
  APP_DOMAIN: "shield.rstglobal.in"
  GATEWAY_URL: "http://shield-gateway:8280"

  # Timezone
  TZ: "Asia/Kolkata"

  # Inter-service URLs (K8s DNS)
  SHIELD_NOTIFICATION_URL: "http://shield-notification:8286"

  # RabbitMQ — not deployed in K8s; disable listeners to avoid spam
  MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
  SPRING_RABBITMQ_LISTENER_SIMPLE_AUTOSTARTUP: "false"
  SPRING_RABBITMQ_LISTENER_DIRECT_AUTOSTARTUP: "false"
