apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shield-prod

resources:
- ../../base/eureka
- ../../base/config
- ../../base/gateway
- ../../base/auth
- ../../base/tenant
- ../../base/profile
- ../../base/dns
- ../../base/dns-resolver
- ../../base/location
- ../../base/notification
- ../../base/rewards
- ../../base/analytics
- ../../base/admin
- ../../base/ai
- ../../base/website
- ../../base
# HPA disabled until vCPU quota > 4 vCPUs in Central India subscription.
# To re-enable: uncomment the line below and request quota at
#   https://portal.azure.com → Subscriptions → Usage + Quotas → Central India → Request 12 vCPUs
# - ../../hpa
- ingress-prod.yaml

  # CI pipeline sets these via: kustomize edit set image REGISTRY/shield-gateway=<acr>.azurecr.io/shield-gateway:<sha>
images:
- name: REGISTRY/shield-admin
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-admin
  newTag: latest
- name: REGISTRY/shield-ai
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-ai
  newTag: latest
- name: REGISTRY/shield-analytics
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-analytics
  newTag: latest
- name: REGISTRY/shield-auth
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-auth
  newTag: latest
- name: REGISTRY/shield-config
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-config
  newTag: latest
- name: REGISTRY/shield-dns
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-dns
  newTag: latest
- name: REGISTRY/shield-dns-resolver
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-dns-resolver
  newTag: latest
- name: REGISTRY/shield-eureka
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-eureka
  newTag: latest
- name: REGISTRY/shield-gateway
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-gateway
  newTag: latest
- name: REGISTRY/shield-location
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-location
  newTag: latest
- name: REGISTRY/shield-notification
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-notification
  newTag: latest
- name: REGISTRY/shield-profile
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-profile
  newTag: latest
- name: REGISTRY/shield-rewards
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-rewards
  newTag: latest
- name: REGISTRY/shield-tenant
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-tenant
  newTag: latest
- name: REGISTRY/shield-website
  newName: shieldacrh44d4fynx4l2c.azurecr.io/shield-website
  newTag: latest

  # NOTE: All services at 1 replica — vCPU quota in Central India is 4 (1 node).
  # Request quota increase at https://portal.azure.com to enable 2+ replicas for HA.
  # HPA will auto-scale when quota allows cluster autoscaler to add nodes.
  #
  # maxSurge: 0 is required on this tight-capacity node — the default maxSurge=1
  # would require one free pod slot per deployment during rollouts, but all 30
  # pod slots are consumed by prod + kube-system. Zero-surge = kill old pod
  # first, schedule new pod in the freed slot. Trade-off: brief (~60s) outage
  # per service during rollouts. Flip back to default once a user node pool
  # with higher max-pods is added.
patches:
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: shield-config
    data:
      LOG_LEVEL: "WARN"
      SPRING_PROFILES_ACTIVE: "kubernetes,prod"
- patch: |-
    - op: replace
      path: /spec/strategy
      value:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
  target:
    kind: Deployment
    name: "shield-.*"
