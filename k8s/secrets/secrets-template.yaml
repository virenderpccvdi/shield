# Shield Platform — Kubernetes Secrets Template
# 1. Fill in all REPLACE_WITH_* values
# 2. Base64-encode each value: echo -n 'value' | base64
# 3. Apply: kubectl apply -f secrets.yaml -n shield-prod
#           kubectl apply -f secrets.yaml -n shield-dev
# DO NOT commit the filled-in version to git!

apiVersion: v1
kind: Secret
metadata:
  name: shield-secrets
  namespace: shield-prod   # change to shield-dev for dev namespace
type: Opaque
data:
  # PostgreSQL — from Bicep output pgHostname
  # jdbc:postgresql://<pgHostname>:5432/shield_db
  DB_URL: REPLACE_WITH_BASE64(jdbc:postgresql://<pg-host>:5432/shield_db)
  DB_USERNAME: REPLACE_WITH_BASE64(shieldadmin)
  DB_PASSWORD: REPLACE_WITH_BASE64(<your-pg-password>)

  # Redis — from Bicep output redisHostname + redisPort (6380 for SSL)
  REDIS_HOST: REPLACE_WITH_BASE64(<redis-host>.redis.cache.windows.net)
  REDIS_PORT: REPLACE_WITH_BASE64(6380)
  REDIS_PASSWORD: REPLACE_WITH_BASE64(<redis-access-key>)
  REDIS_SSL: REPLACE_WITH_BASE64(true)

  # JWT secret (same as current .env)
  JWT_SECRET: REPLACE_WITH_BASE64(7a9f3b2c8d5e1f4a6b0c3d7e2f5a8b1c4d7e0f3a6b9c2d5e8f1a4b7c0d3e6f9a)

  # Stripe (from current .env)
  STRIPE_SECRET_KEY: REPLACE_WITH_BASE64(<stripe-secret-key>)
  STRIPE_WEBHOOK_SECRET: REPLACE_WITH_BASE64(<stripe-webhook-secret>)

  # SMTP (from current .env)
  SMTP_HOST: REPLACE_WITH_BASE64(smtp.gmail.com)
  SMTP_PORT: REPLACE_WITH_BASE64(587)
  SMTP_USERNAME: REPLACE_WITH_BASE64(<smtp-user>)
  SMTP_PASSWORD: REPLACE_WITH_BASE64(<smtp-password>)
  SMTP_FROM: REPLACE_WITH_BASE64(Shield Platform <noreply@rstglobal.in>)

  # AI API keys (from current .env)
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64(<anthropic-key>)
  DEEPSEEK_API_KEY: REPLACE_WITH_BASE64(<deepseek-key>)
  GOOGLE_MAPS_API_KEY: REPLACE_WITH_BASE64(<google-maps-key>)

  # App domain
  APP_DOMAIN: REPLACE_WITH_BASE64(shield.rstglobal.in)
