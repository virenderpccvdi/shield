<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="refresh" content="0;url=/app/"/>
  <title>Shield Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f8faff; }
    .msg { text-align: center; color: #6b7280; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e3f2fd;
               border-top-color: #1565C0; border-radius: 50%;
               animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    Redirecting to dashboard…
  </div>
  <script>
    // Redirect to React SPA — all role-based routing handled by AuthGuard in React
    window.location.replace('/app/');
  </script>
</body>
</html>
