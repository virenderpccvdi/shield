<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page not found — Shield</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="theme-color" content="#1E4FC4"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="preload" href="/tokens.css?v=3" as="style"/>
  <link rel="preload" href="/components.css?v=3" as="style"/>
  <link rel="stylesheet" href="/tokens.css?v=3"/>
  <link rel="stylesheet" href="/components.css?v=3"/>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-8) var(--s-4);
      background:
        radial-gradient(ellipse 60% 45% at 85% 15%, rgba(30,79,196,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(107,155,245,0.10) 0%, transparent 60%),
        var(--ink-50);
      text-align: center;
    }
    .err-card {
      max-width: 480px;
    }
    .err-code {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(5rem, 14vw, 9rem);
      line-height: 1;
      color: var(--brand-600);
      letter-spacing: -0.04em;
      margin-bottom: var(--s-4);
      background: linear-gradient(180deg, var(--brand-500), var(--brand-800));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--s-3);
    }
    p {
      font-size: var(--text-base);
      color: var(--ink-500);
      margin-bottom: var(--s-8);
      line-height: var(--leading-normal);
    }
    .err-actions {
      display: flex;
      gap: var(--s-3);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<div class="err-card">
  <div class="err-code">404</div>
  <h1>We couldn't find that page</h1>
  <p>
    The link you followed may be broken, or the page may have been moved.
    Let's get you back on track.
  </p>
  <div class="err-actions">
    <a href="/" class="btn btn-primary">Go to home</a>
    <a href="/login.html" class="btn btn-ghost">Sign in</a>
  </div>
</div>

</body>
</html>
