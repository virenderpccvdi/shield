server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /app/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /app/index.html;
    }

    location ~* /app/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /app/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /app/index.html;
    }

    location /download/ {
        add_header Content-Type "application/vnd.android.package-archive";
        add_header Content-Disposition 'attachment; filename="shield-app.apk"';
        add_header X-Content-Type-Options nosniff;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        try_files $uri =404;
    }

    location ~* \.apk$ {
        add_header Content-Type "application/vnd.android.package-archive";
        add_header Content-Disposition "attachment";
    }

    # Shared design-system CSS — long cache (?v=3 bumps cache key on edit)
    location = /tokens.css     { add_header Cache-Control "public, max-age=31536000"; }
    location = /components.css { add_header Cache-Control "public, max-age=31536000"; }

    location / {
        try_files $uri $uri/ =404;
    }

    # Explicit 404 — previously /index.html fallback masked broken links
    error_page 404 /404.html;
    location = /404.html { internal; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 512;
}
