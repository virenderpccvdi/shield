# Shield Platform — Azure DevOps CI/CD Pipeline
# Self-hosted agent: shield-build-server (this server, has Java21/Maven/Docker/kubectl)
#
# Triggers:
#   - Push to 'main'    → build + deploy to shield-prod (manual approval required)
#   - Push to 'develop' → build + deploy to shield-dev (auto)
#
# Required Variable Group (Pipelines → Library → shield-aks-vars):
#   ACR_LOGIN_SERVER, AKS_RESOURCE_GROUP, AKS_CLUSTER_NAME, AZURE_SUBSCRIPTION_ID
#
# Required Service Connections:
#   shield-azure-rm  (Azure Resource Manager)
#   shield-acr       (Docker Registry → ACR)

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  - group: shield-aks-vars
  - name: IMAGE_TAG
    value: $(Build.SourceVersion)
  - name: isDevelop
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/develop')]
  - name: isMain
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]

stages:

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1: BUILD — Maven + Docker push
# ══════════════════════════════════════════════════════════════════════════════
- stage: Build
  displayName: 'Build & Push Images'
  jobs:

  - job: BuildJava
    displayName: 'Maven Build + Docker Push (Java)'
    pool:
      name: shield-self-hosted
    timeoutInMinutes: 60
    steps:

    - checkout: self
      clean: false   # reuse workspace for faster incremental builds

    - task: Cache@2
      displayName: Cache Maven packages
      inputs:
        key: 'maven | "$(Agent.OS)" | **/pom.xml'
        restoreKeys: 'maven | "$(Agent.OS)"'
        path: $(HOME)/.m2

    - script: |
        export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        echo "Java: $(java -version 2>&1 | head -1)"
        echo "Maven: $(/usr/share/maven/bin/mvn -version 2>&1 | head -1)"
        /usr/share/maven/bin/mvn package -DskipTests -T 4 -q \
          -Dmaven.repo.local=$(HOME)/.m2/repository
      displayName: 'Maven Build (all services)'

    - script: |
        set -e
        export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        ACR=$(ACR_LOGIN_SERVER)
        TAG=$(IMAGE_TAG)
        echo "Logging in to ACR: $ACR"
        az acr login --name ${ACR%%.*} 2>&1 | tail -2

        SERVICES="eureka gateway auth tenant profile dns location notification rewards analytics admin"
        echo "Building images in parallel..."
        for svc in $SERVICES; do
          docker build \
            -t ${ACR}/shield-${svc}:${TAG} \
            -t ${ACR}/shield-${svc}:latest \
            -f shield-${svc}/Dockerfile \
            shield-${svc}/ &
        done
        wait
        echo "Pushing images..."
        for svc in $SERVICES; do
          docker push ${ACR}/shield-${svc}:${TAG} &
          docker push ${ACR}/shield-${svc}:latest &
        done
        wait
        echo "All images built and pushed."
      displayName: 'Docker Build & Push (Java services)'
      env:
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

  - job: BuildAI
    displayName: 'Docker Build & Push (shield-ai)'
    pool:
      name: shield-self-hosted
    steps:
    - checkout: self
      clean: false
    - script: |
        set -e
        ACR=$(ACR_LOGIN_SERVER)
        TAG=$(IMAGE_TAG)
        az acr login --name ${ACR%%.*} 2>&1 | tail -2
        docker build -t ${ACR}/shield-ai:${TAG} -t ${ACR}/shield-ai:latest shield-ai/
        docker push ${ACR}/shield-ai:${TAG}
        docker push ${ACR}/shield-ai:latest
      displayName: 'Build & Push shield-ai'

  # ── React Dashboard ──────────────────────────────────────────────────────────
  - job: BuildDashboard
    displayName: 'Build React Dashboard'
    pool:
      name: shield-self-hosted
    steps:
    - checkout: self
      clean: false

    - task: Cache@2
      displayName: Cache npm packages
      inputs:
        key: 'npm | "$(Agent.OS)" | shield-dashboard/package-lock.json'
        restoreKeys: 'npm | "$(Agent.OS)"'
        path: shield-dashboard/node_modules

    - script: |
        set -e
        cd shield-dashboard
        # Use npm install (not npm ci) — package-lock.json may diverge on self-hosted agent
        npm install --prefer-offline
        npm run build
        echo "Dashboard built: $(du -sh dist)"
      displayName: 'npm build'

    - script: |
        set -e
        # Deploy built assets to web server (only on self-hosted runner = this server)
        if [ -d "/var/www/ai/FamilyShield/shield-website/app" ]; then
          rm -rf /var/www/ai/FamilyShield/shield-website/app/assets
          cp -r shield-dashboard/dist/assets /var/www/ai/FamilyShield/shield-website/app/assets
          cp shield-dashboard/dist/index.html /var/www/ai/FamilyShield/shield-website/app/index.html
          echo "Dashboard deployed to /app/"
        fi
      displayName: 'Deploy dashboard to web root'

  # ── Flutter APK ──────────────────────────────────────────────────────────────
  - job: BuildFlutter
    displayName: 'Build Flutter APK'
    pool:
      name: shield-self-hosted
    steps:
    - checkout: self
      clean: false

    - script: |
        set -e
        export PATH="/opt/flutter/bin:$PATH"
        # google-services.json is gitignored (contains Firebase credentials).
        # On this self-hosted agent the source repo lives at the same path.
        GSF="/var/www/ai/FamilyShield/shield-app/android/app/google-services.json"
        DEST="shield-app/android/app/google-services.json"
        if [ -f "$GSF" ] && [ ! -f "$DEST" ]; then
          cp "$GSF" "$DEST"
          echo "Copied google-services.json from server repo"
        fi
        cd shield-app
        flutter pub get
        flutter build apk --debug --no-tree-shake-icons
        APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
        echo "APK built: $APK_SIZE"
      displayName: 'flutter build apk'

    - script: |
        set -e
        cp shield-app/build/app/outputs/flutter-apk/app-debug.apk \
           /var/www/ai/FamilyShield/static/shield-app.apk
        echo "APK deployed: $(du -sh /var/www/ai/FamilyShield/static/shield-app.apk)"
      displayName: 'Deploy APK to static directory'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2: DEPLOY DEV — auto on develop branch
# ══════════════════════════════════════════════════════════════════════════════
- stage: DeployDev
  displayName: 'Deploy → shield-dev'
  dependsOn: Build
  condition: and(succeeded('Build'), eq(variables.isDevelop, 'true'))
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy to shield-dev namespace'
    pool:
      name: shield-self-hosted
    environment: 'shield-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: false

          - script: |
              cd k8s/overlays/dev
              SERVICES="eureka gateway auth tenant profile dns location notification rewards analytics admin ai"
              for svc in $SERVICES; do
                kustomize edit set image REGISTRY/shield-${svc}=$(ACR_LOGIN_SERVER)/shield-${svc}:$(IMAGE_TAG)
              done
              kustomize build . | kubectl apply -f -
              kubectl rollout status deployment/shield-gateway -n shield-dev --timeout=300s
              kubectl rollout status deployment/shield-auth -n shield-dev --timeout=300s
            displayName: 'Apply K8s manifests (dev)'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3: DEPLOY PROD — manual approval on main branch
# ══════════════════════════════════════════════════════════════════════════════
- stage: DeployProd
  displayName: 'Deploy → shield-prod'
  dependsOn: Build
  condition: and(succeeded('Build'), eq(variables.isMain, 'true'))
  jobs:
  - deployment: DeployProd
    displayName: 'Deploy to shield-prod namespace'
    pool:
      name: shield-self-hosted
    environment: 'shield-prod'   # approval gate configured on this environment
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: false

          - script: |
              cd k8s/overlays/prod
              SERVICES="eureka gateway auth tenant profile dns location notification rewards analytics admin ai"
              for svc in $SERVICES; do
                kustomize edit set image REGISTRY/shield-${svc}=$(ACR_LOGIN_SERVER)/shield-${svc}:$(IMAGE_TAG)
              done
              kustomize build . | kubectl apply -f -
              for svc in gateway auth tenant profile dns location notification rewards analytics admin; do
                echo "Waiting: shield-${svc}..."
                kubectl rollout status deployment/shield-${svc} -n shield-prod --timeout=300s
              done
              echo "Prod deploy complete."
            displayName: 'Apply K8s manifests (prod)'

          - script: |
              echo "=== Prod pods after deploy ==="
              kubectl get pods -n shield-prod
            displayName: 'Show pod status'
