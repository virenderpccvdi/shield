name: Trivy Security Scan

# Trivy scans Docker images and filesystem for CVEs, misconfigs, and secrets.
# Results upload to GitHub Security tab (SARIF) — free on public repos.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 01:00 UTC (6:30 AM IST) — fresh CVE DB every morning
    - cron: '0 1 * * *'

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Filesystem scan (source code + IaC + configs) ──────────────────────────
  trivy-fs:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'           # never fail the build — just report
          ignore-unfixed: true
          skip-dirs: '.venv,node_modules,target,.m2'

      - name: Upload Trivy FS results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-filesystem'

  # ── Docker image scan — Java services ─────────────────────────────────────
  trivy-docker-java:
    name: Trivy — Docker (Java services)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - shield-auth
          - shield-gateway
          - shield-tenant
          - shield-profile
          - shield-dns
          - shield-analytics
          - shield-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'               # shared cache across matrix jobs

      - name: Build JAR for ${{ matrix.service }}
        run: |
          mvn package -pl ${{ matrix.service }} -am -DskipTests -q --no-transfer-progress

      - name: Build Docker image
        run: |
          docker build -t shield/${{ matrix.service }}:scan ./${{ matrix.service }}/

      - name: Run Trivy Docker scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'image'
          image-ref: 'shield/${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-docker-${{ matrix.service }}'

  # ── Docker image scan — Python + website ──────────────────────────────────
  trivy-docker-other:
    name: Trivy — Docker (AI + Website)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build shield-ai image
        run: docker build -t shield/shield-ai:scan ./shield-ai/

      - name: Run Trivy — shield-ai
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'image'
          image-ref: 'shield/shield-ai:scan'
          format: 'sarif'
          output: 'trivy-ai.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload shield-ai results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-ai.sarif'
          category: 'trivy-docker-ai'

      - name: Build shield-website image
        run: docker build -t shield/shield-website:scan ./shield-website/

      - name: Run Trivy — shield-website
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'image'
          image-ref: 'shield/shield-website:scan'
          format: 'sarif'
          output: 'trivy-website.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload shield-website results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-website.sarif'
          category: 'trivy-docker-website'

  # ── IaC (Kubernetes + Docker Compose) misconfig scan ──────────────────────
  trivy-iac:
    name: Trivy — IaC Misconfigurations
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scan (k8s manifests)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'config'
          scan-ref: './k8s'
          format: 'sarif'
          output: 'trivy-iac.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload IaC results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-iac.sarif'
          category: 'trivy-iac'
