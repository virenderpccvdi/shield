name: CodeQL Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan — Wednesday 03:00 UTC (8:30 AM IST), offset from other nightly jobs
    - cron: '0 3 * * 3'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Java static analysis ───────────────────────────────────────────────────
  analyze-java:
    name: CodeQL — Java
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          # Shield-specific security queries + defaults
          queries: security-extended,security-and-quality

      - name: Build for CodeQL (skip tests)
        run: mvn package -DskipTests -q --no-transfer-progress

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: java
          upload: true

  # ── JavaScript/TypeScript static analysis ──────────────────────────────────
  analyze-js:
    name: CodeQL — TypeScript/JavaScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: shield-dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: shield-dashboard
        run: npm ci --prefer-offline

      - name: Build dashboard for analysis
        working-directory: shield-dashboard
        run: npm run build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: javascript-typescript
          upload: true

  # ── Python static analysis ─────────────────────────────────────────────────
  analyze-python:
    name: CodeQL — Python
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install shield-ai dependencies
        working-directory: shield-ai
        run: pip install -r requirements.txt

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: python
          upload: true

  # ── Secret scanning (Gitleaks) ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for secret scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
