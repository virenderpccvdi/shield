spring:
  application:
    name: shield-auth

  # Pull shared config from shield-config server (datasource, redis, jwt, eureka)
  config:
    import: optional:configserver:http://localhost:8288

  datasource:
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      pool-name: ShieldAuthPool
      leak-detection-threshold: 60000

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

shield:
  direct-tenant-id: 00000000-0000-0000-0000-000000000001

  # Flyway — auth schema
  flyway:
    schemas: auth
    table: flyway_schema_history_auth
    locations: classpath:db/migration/auth

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.rstglobal.shield.auth: DEBUG
    org.springframework.security: INFO
