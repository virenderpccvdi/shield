name: shield_app
description: Shield — Smart Family Internet Protection
publish_to: 'none'
version: 2.0.0+200

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.8.0
  http: ^1.2.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.6
  shimmer: ^3.0.0

  # Biometric auth
  local_auth: ^3.0.1

  # Charts
  fl_chart: ^1.2.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0

  # Maps & Location
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2

  # WebSocket
  stomp_dart_client: ^2.0.0

  # QR Code Scanner
  mobile_scanner: ^5.2.3

  # Sensors (shake detection)
  sensors_plus: ^4.0.0

  # Battery
  battery_plus: ^6.0.3

  # Background service (keeps location tracking alive when app is in background)
  flutter_background_service: ^5.0.0

  # Installed apps
  installed_apps: ^1.4.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Fonts (Guardian's Lens design system: Manrope + Inter)
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
