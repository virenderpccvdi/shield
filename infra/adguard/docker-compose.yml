services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: shield-adguard
    restart: unless-stopped
    ports:
      - "3053:53/tcp"       # DNS TCP (3053 — port 53 used by systemd-resolved)
      - "3053:53/udp"       # DNS UDP
      - "3143:443/tcp"      # DoH HTTPS (internal)
      - "3080:80/tcp"       # HTTP admin UI + setup wizard
      - "3443:3000/tcp"     # HTTPS admin panel
      - "8853:853/tcp"      # DNS-over-TLS
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
    environment:
      - TZ=Asia/Kolkata
    networks:
      - shield-net

networks:
  shield-net:
    driver: bridge
