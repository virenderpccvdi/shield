groups:
  - name: shield_services
    rules:
      - alert: ServiceDown
        expr: up{job=~"shield-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Shield service {{ $labels.job }} is down"
          description: "Shield service {{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5..",job=~"shield-.*"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} is returning 5xx errors at a rate of {{ $value | humanize }}/s"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job=~"shield-.*"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow responses on {{ $labels.job }}"
          description: "P95 response time for {{ $labels.job }} is {{ $value | humanizeDuration }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"
          description: "Root filesystem has only {{ $value | humanizePercentage }} available"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 90%"
          description: "System memory usage is at {{ $value | humanizePercentage }}"

  - name: shield_database
    rules:
      - alert: PgBouncerDown
        expr: up{job="pgbouncer-shield"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Shield PgBouncer is down"
          description: "PgBouncer for Shield platform is not responding"

      - alert: HighDBConnections
        expr: sum(pg_stat_activity_count{datname="shield_db"}) > 150
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections on shield_db"
          description: "shield_db has {{ $value }} active connections"
