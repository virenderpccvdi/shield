global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Shield Gateway (Spring Cloud Gateway - WebFlux)
  - job_name: 'shield-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8280']
        labels:
          service: gateway
          group: shield

  # Shield Auth Service
  - job_name: 'shield-auth'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8281']
        labels:
          service: auth
          group: shield

  # Shield Tenant Service
