server:
  port: 8286

spring:
  application:
    name: shield-notification

  config:
    import: optional:configserver:http://localhost:8288

  datasource:
    hikari:
      maximum-pool-size: 8
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: ShieldNotificationPool
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:shield}
    password: ${RABBITMQ_PASSWORD:Shield@Rabbit2026}
    listener:
      simple:
        auto-startup: ${RABBITMQ_ENABLED:false}

  # Thymeleaf for email templates
  thymeleaf:
    prefix: classpath:/templates/email/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

rabbitmq:
  enabled: ${RABBITMQ_ENABLED:false}

eureka:
  client:
    service-url:
      defaultZone: http://eureka:${EUREKA_PASSWORD:ShieldEureka2026}@localhost:8261/eureka/
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

shield:
  tenant:
    base-url: ${SHIELD_TENANT_URL:http://localhost:8282}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    rabbit:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.rstglobal.shield.notification: DEBUG

# Firebase defaults (overridden by config server)
firebase:
  enabled: false
  service-account-path: /var/www/ai/FamilyShield/config/firebase-service-account.json

# Twilio SMS (disabled by default; set TWILIO_ENABLED=true in .env to activate)
twilio:
  enabled: ${TWILIO_ENABLED:false}
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
