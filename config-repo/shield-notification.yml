server:
  port: 8286

spring:
  application:
    name: shield-notification

# Firebase Cloud Messaging — set enabled: true once service account is configured
firebase:
  enabled: false
  service-account-path: /var/www/ai/FamilyShield/config/firebase-service-account.json

# SMTP defaults — overridden by SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM env vars
smtp:
  host: ${SMTP_HOST:smtp.zoho.com}
  port: ${SMTP_PORT:465}
  user: ${SMTP_USER:noreply@rstglobal.in}
  pass: ${SMTP_PASS:}
  from: ${SMTP_FROM:noreply@rstglobal.in}
