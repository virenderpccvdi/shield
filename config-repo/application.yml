# Shared config loaded by ALL Shield services
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shield_db}
    username: ${DB_USER:shield}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    baseline-on-migrate: true
    out-of-order: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:${EUREKA_PASSWORD:changeme}@localhost:8261/eureka/
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      # CVE-2026-22733: disable Health Groups endpoint to prevent info disclosure
      group:
        readiness:
          include: []
        liveness:
          include: []
  metrics:
    export:
      prometheus:
        enabled: true
  # CVE-2026-22733: disable Cloud Foundry actuator (exposes /cloudfoundryapplication)
  cloudfoundry:
    enabled: false

shield:
  jwt:
    secret: ${JWT_SECRET}  # Required — no default; service will refuse to start if missing
    expiry-hours: ${JWT_EXPIRY_HOURS:1}
    refresh-days: ${JWT_REFRESH_DAYS:30}
  app:
    domain: ${APP_DOMAIN:shield.rstglobal.in}
    url: ${APP_URL:https://shield.rstglobal.in}
