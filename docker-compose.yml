# Shield Platform - Docker Infrastructure
# Java microservices run as systemd units; this compose manages supporting Docker services.
#
# Usage:
#   docker compose up -d                 # Start all Docker services
#   docker compose -f infra/monitoring/docker-compose.yml up -d   # Monitoring only
#   docker compose -f infra/adguard/docker-compose.yml up -d      # AdGuard only

include:
  - path: infra/monitoring/docker-compose.yml
  - path: infra/adguard/docker-compose.yml
