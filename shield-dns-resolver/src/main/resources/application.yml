server:
  port: 8292

spring:
  application:
    name: shield-dns-resolver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8261/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

dns:
  upstream-dns: 1.1.1.1
  upstream-fallback-dns: 8.8.8.8
  rules-ttl-seconds: 300
  query-timeout-ms: 2000

shield:
  dns:
    service:
      url: ${SHIELD_DNS_SERVICE_URL:http://shield-dns:8284}
  analytics:
    service:
      url: ${SHIELD_ANALYTICS_SERVICE_URL:http://shield-analytics:8289}

logging:
  level:
    com.rstglobal.shield.dnsresolver: DEBUG
    org.xbill.DNS: WARN
